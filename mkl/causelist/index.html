<!DOCTYPE html>

<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Court Cause List</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Segoe UI,Arial;
margin:0;
background:#f4f6fb;
}

/* HEADER */

.header{
background:#b91c1c;
color:white;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold;
position:sticky;
top:0;
z-index:1000;
}

.date{
font-size:16px;
margin-top:4px;
}

/* BACK BUTTON */

.nav{
padding:10px;
}

.homeBtn{
background:#1e3a8a;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

/* SEARCH */

.searchContainer{
background:white;
padding:12px;
position:sticky;
top:64px;
z-index:900;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.search{
width:100%;
padding:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

/* TABLE WRAPPER (MOBILE FIX) */

.tableWrap{
width:100%;
overflow-x:auto;
}

/* TABLE */

table{
width:95%;
min-width:900px;
margin:20px auto;
border-collapse:collapse;
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

thead th{
background:#b91c1c;
color:white;
padding:10px;
text-align:left;
font-size:14px;
}

td{
padding:9px;
border-bottom:1px solid #e5e5e5;
font-size:14px;
}

tr:nth-child(even){
background:#f7f8fc;
}

</style>

</head>

<body>

<div class="header">
Court Cause List
<div id="causeDate" class="date"></div>
</div>

<div class="nav">
<button class="homeBtn" onclick="location.href='../'">← Home</button>
</div>

<div class="searchContainer">
<input id="searchBox" class="search"
placeholder="Search party / advocate / case..."
onkeyup="searchCase()">
</div>

<div class="tableWrap">

<table>

<thead>
<tr>
<th>Serial</th>
<th>Court</th>
<th>Case Number</th>
<th>Party Name</th>
<th>Advocate</th>
<th>For</th>
<th>Stage</th>
<th>Comments</th>
</tr>
</thead>

<tbody id="cases"></tbody>

</table>

</div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQI_9xcBNvx2Pm38N5p0AvDp3zosdsRbgY8cQLUC6enncLXmvgpYx3J_aQupFKl-ne_q604KU8MgtBz/pub?output=csv";

let allCases=[];

Papa.parse(csvURL,{
download:true,
header:true,

complete:function(results){

allCases = results.data.filter(row =>
row["Party Name"] && row["Party Name"] !== "Party Name"
);

if(allCases.length>0){

document.getElementById("causeDate").innerText =
allCases[0]["Date"];

}

renderCases(allCases);

}

});

function safe(v){
return v ? v : "";
}

function renderCases(data){

let html="";

data.forEach(row=>{

html+=`

<tr>

<td>${safe(row["Serial Number"])}</td>
<td>${safe(row["06-Mar CCH"])}</td>
<td>${safe(row["Case Type/Case Number/Case Year"])}</td>
<td>${safe(row["Party Name"])}</td>
<td>${safe(row["Advocate"])}</td>
<td>${safe(row["Advocate for"])}</td>
<td>${safe(row["Stage"])}</td>
<td>${safe(row["Comments"])}</td>

</tr>

`;

});

document.getElementById("cases").innerHTML=html;

}

function searchCase(){

let query=document.getElementById("searchBox").value.toLowerCase();

let filtered=allCases.filter(row=>{

let text=Object.values(row).join(" ").toLowerCase();

return text.includes(query);

});

renderCases(filtered);

}

</script>

</body>
</html>
