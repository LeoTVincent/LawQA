<!DOCTYPE html>

<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Court Cause List</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Segoe UI,Arial;
margin:0;
background:#f4f6fb;
}

/* HEADER */

.header{
background:#b91c1c;
color:white;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold;
position:sticky;
top:0;
z-index:1000;
}

/* SEARCH BAR */

.searchContainer{
background:white;
padding:12px;
position:sticky;
top:64px;
z-index:900;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.search{
width:100%;
padding:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.result{
margin-top:6px;
font-size:14px;
color:#444;
}

/* TABLE */

table{
width:95%;
margin:20px auto;
border-collapse:collapse;
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* FIXED TABLE HEADER */

thead{
position:sticky;
top:120px;
z-index:800;
}

thead th{
background:#b91c1c;
color:white;
padding:10px;
text-align:left;
font-size:14px;
}

/* TABLE BODY */

td{
padding:9px;
border-bottom:1px solid #e5e5e5;
font-size:14px;
vertical-align:top;
}

tr:nth-child(even){
background:#f7f8fc;
}

tr:hover{
background:#fff8dc;
}

/* STAGE BADGES */

.stage{
padding:4px 8px;
border-radius:4px;
font-size:12px;
color:white;
font-weight:bold;
}

.stage-evidence{background:#f59e0b;}
.stage-argument{background:#2563eb;}
.stage-order{background:#16a34a;}
.stage-other{background:#6b7280;}

mark{
background:#fff176;
}

</style>

</head>

<body>

<div class="header">
Court Cause List
</div>

<div class="searchContainer">

<input id="searchBox" class="search"
placeholder="Search party / advocate / case..."
onkeyup="searchCase()">

<div id="resultCount" class="result"></div>

</div>

<table>

<thead>
<tr>
<th>Serial</th>
<th>Court</th>
<th>Case Number</th>
<th>Party Name</th>
<th>Advocate</th>
<th>For</th>
<th>Stage</th>
<th>Comments</th>
</tr>
</thead>

<tbody id="cases"></tbody>

</table>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQI_9xcBNvx2Pm38N5p0AvDp3zosdsRbgY8cQLUC6enncLXmvgpYx3J_aQupFKl-ne_q604KU8MgtBz/pub?output=csv";

let allCases=[];

Papa.parse(csvURL,{
download:true,
header:true,

complete:function(results){

allCases = results.data.filter(row =>
row["Party Name"] && row["Party Name"] !== "Party Name"
);

renderCases(allCases);

}

});

function safe(v){
return v ? v : "";
}

/* SEARCH HIGHLIGHT */

function highlight(text,keywords){

if(!keywords.length) return text;

keywords.forEach(k=>{
let regex=new RegExp(`(${k})`,"gi");
text=text.replace(regex,"<mark>$1</mark>");
});

return text;

}

/* STAGE COLORS */

function stageBadge(stage){

let s = stage.toLowerCase();

if(s.includes("evidence")) return "stage stage-evidence";
if(s.includes("argument")) return "stage stage-argument";
if(s.includes("order")) return "stage stage-order";

return "stage stage-other";

}

function renderCases(data,query=""){

let keywords=query.trim().split(/\s+/).filter(Boolean);

let html="";

data.forEach(row=>{

let stage=safe(row["Stage"]);

html+=`

<tr>

<td>${safe(row["Serial Number"])}</td>

<td>${highlight(safe(row["06-Mar CCH"]),keywords)}</td>

<td>${highlight(safe(row["Case Type/Case Number/Case Year"]),keywords)}</td>

<td>${highlight(safe(row["Party Name"]),keywords)}</td>

<td>${highlight(safe(row["Advocate"]),keywords)}</td>

<td>${highlight(safe(row["Advocate for"]),keywords)}</td>

<td>
<span class="${stageBadge(stage)}">
${highlight(stage,keywords)}
</span>
</td>

<td>${highlight(safe(row["Comments"]),keywords)}</td>

</tr>

`;

});

document.getElementById("cases").innerHTML=html;
document.getElementById("resultCount").innerText=data.length+" cases found";

}

function searchCase(){

let query=document.getElementById("searchBox").value.toLowerCase();

let keywords=query.trim().split(/\s+/).filter(Boolean);

let filtered=allCases.filter(row=>{

let text=Object.values(row).join(" ").toLowerCase();

return keywords.every(k=>text.includes(k));

});

renderCases(filtered,query);

}

</script>

</body>
</html>
