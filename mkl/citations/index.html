<!DOCTYPE html>

<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Case Law Knowledge Base</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Segoe UI,Arial;
margin:0;
background:#f3f6fb;
}

.header{
background:#1e3a8a;
color:white;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold;
position:sticky;
top:0;
z-index:1000;
}

/* HOME BUTTON AREA */

.nav{
padding:10px;
}

.homeBtn{
background:#b91c1c;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

/* SEARCH */

.searchContainer{
background:white;
padding:10px;
position:sticky;
top:60px;
z-index:999;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.search{
width:100%;
padding:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.result{
margin-top:6px;
font-size:14px;
color:#444;
}

.container{
padding-bottom:40px;
}

/* CARDS */

.card{
background:white;
margin:12px;
padding:16px;
border-radius:10px;
border-left:6px solid #b91c1c;
box-shadow:0 3px 8px rgba(0,0,0,0.10);
}

.case{
font-size:18px;
font-weight:bold;
color:#1e3a8a;
margin-bottom:10px;
}

.section{
margin-top:6px;
line-height:1.4;
}

.label{
font-weight:bold;
color:#b91c1c;
}

.value{
color:#333;
}

.tag{
display:inline-block;
background:#1e3a8a;
color:white;
padding:4px 8px;
border-radius:4px;
font-size:12px;
margin-top:8px;
}

mark{
background:#fff176;
padding:2px;
border-radius:2px;
}

</style>

</head>

<body>

<div class="header">
Adv. MK Lokesha Case Law Knowledge Base
</div>

<div class="nav">
<button class="homeBtn" onclick="location.href='../'">← Home</button>
</div>

<div class="searchContainer">
<input id="searchBox" class="search" placeholder="Search case / CPC / tag..." onkeyup="searchCase()">
<div id="resultCount" class="result"></div>
</div>

<div id="cases" class="container"></div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRjCuZ5JAhVcIs3eHEd4KCpe2LCWUj3fZIj2KjPP43kTUVrL_mnK1w-14jnrw0J5G4Lc35NDX3Fj00-/pub?output=csv";

let allCases=[];

Papa.parse(csvURL,{
download:true,
header:true,

complete:function(results){

allCases = results.data.filter(row =>
row["Case Name"] && row["Case Name"] !== "Case Name"
);

renderCases(allCases);

}

});

function safe(v){
return v ? v : "";
}

function highlight(text,keywords){

if(!keywords.length) return text;

keywords.forEach(k=>{
let regex=new RegExp(`(${k})`,"gi");
text=text.replace(regex,"<mark>$1</mark>");
});

return text;

}

function renderCases(data,query=""){

let keywords=query.trim().split(/\s+/).filter(Boolean);

let html="";

data.forEach(row=>{

html+=`

<div class="card">

<div class="case">${safe(row["S.No"])}. ${highlight(safe(row["Case Name"]),keywords)}</div>

<div class="section"><span class="label">Court & Year:</span>
<span class="value">${highlight(safe(row["Court & Year"]),keywords)}</span></div>

<div class="section"><span class="label">Type of Suit:</span>
<span class="value">${highlight(safe(row["Type of Suit"]),keywords)}</span></div>

<div class="section"><span class="label">CPC Provision:</span>
<span class="value">${highlight(safe(row["CPC Provision"]),keywords)}</span></div>

<div class="section"><span class="label">Other Law / Section:</span>
<span class="value">${highlight(safe(row["Other Law / Section"]),keywords)}</span></div>

<div class="section"><span class="label">Key Legal Issue:</span>
<span class="value">${highlight(safe(row["Key Legal Issue"]),keywords)}</span></div>

<div class="section"><span class="label">Key Principle:</span>
<span class="value">${highlight(safe(row["Key Principle"]),keywords)}</span></div>

<div class="section"><span class="label">Practical Use:</span>
<span class="value">${highlight(safe(row["Practical Use"]),keywords)}</span></div>

<div class="tag">${highlight(safe(row["Tag"]),keywords)}</div>

<div class="section"><span class="label">Tag Meaning:</span>
<span class="value">${highlight(safe(row["Tag Meaning"]),keywords)}</span></div>

</div>

`;

});

document.getElementById("cases").innerHTML=html;
document.getElementById("resultCount").innerText=data.length+" cases found";

}

function searchCase(){

let query=document.getElementById("searchBox").value.toLowerCase();

let keywords=query.trim().split(/\s+/).filter(Boolean);

let filtered=allCases.filter(row=>{

let text=Object.values(row).join(" ").toLowerCase();

return keywords.every(k=>text.includes(k));

});

renderCases(filtered,query);

}

</script>

</body>
</html>
